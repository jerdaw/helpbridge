name: Production Smoke

on:
  workflow_dispatch:

concurrency:
  group: helpbridge-production-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify public health endpoint
        run: |
          python - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen("https://helpbridge.ca/api/v1/health", timeout=20) as response:
              payload = json.load(response)

          assert payload.get("status") in {"healthy", "degraded"}, payload
          print(payload)
          PY

      - name: Verify apex response
        run: |
          curl -sSI https://helpbridge.ca > apex.headers
          grep -Eq '^HTTP/.* (200|307)' apex.headers

      - name: Verify www redirect
        run: |
          curl -sSI https://www.helpbridge.ca > www.headers
          grep -Eq '^HTTP/.* 308' www.headers
          grep -Eqi '^location: https://helpbridge\.ca/?$' www.headers

      - name: Verify robots and sitemap host
        run: |
          curl -fsS https://helpbridge.ca/robots.txt > robots.txt
          grep -Fx 'Sitemap: https://helpbridge.ca/sitemap.xml' robots.txt
          curl -fsS https://helpbridge.ca/sitemap.xml > sitemap.xml
          grep -F '<loc>https://helpbridge.ca/' sitemap.xml

      - name: Verify runtime security headers
        run: npm run validate:security-headers:runtime
        env:
          SECURITY_HEADERS_BASE_URL: https://helpbridge.ca
